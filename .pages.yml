media:
  input: media
  output: /khiet-lam-portfolio/media
  rename: safe
  categories: [image]

content:
  - name: site-settings
    label: Site introduction and contact
    type: file
    path: data/content.json
    format: json
    fields:
      - name: site
        label: Personal information
        type: object
        fields:
          - name: name
            label: Display name
            type: string
            required: true
          - name: eyebrow
            label: Short location line
            type: string
          - name: headline
            label: Main headline
            type: string
          - name: intro
            label: Introduction
            type: text
          - name: about
            label: About paragraph
            type: text
          - name: location
            label: Location
            type: string
          - name: email
            label: Email
            type: string
          - name: phone
            label: Phone
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: archiveUrl
            label: Google Drive archive URL
            type: string
          - name: cvUrl
            label: CV URL
            type: string

  - name: portfolio-v2
    label: Portfolio collections — edit here
    type: file
    path: data/portfolio.json
    format: json
    fields:
      - name: categories
        label: Six main fields
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{label}"
        fields:
          - name: id
            label: Category ID
            type: string
            required: true
          - name: label
            label: Display title
            type: string
          - name: short
            label: Short label
            type: string
          - name: intro
            label: Collection introduction
            type: text

      - name: projects
        label: Articles and Drive collections
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title} / {category}"
        fields:
          - name: id
            label: Unique project ID
            type: string
            required: true
          - name: category
            label: Main field
            type: select
            required: true
            options:
              values:
                - name: curation
                  label: Art Curator
                - name: copywriting
                  label: Copywriting
                - name: publishing
                  label: Publishing
                - name: interviews
                  label: Talks & Interviews
                - name: seo
                  label: SEO Content
                - name: board-game
                  label: Board Game Design
          - name: title
            label: Article title
            type: string
            required: true
          - name: client
            label: Organisation or client
            type: string
          - name: period
            label: Period
            type: string
          - name: role
            label: Your role
            type: string
          - name: folderUrl
            label: Complete Drive folder URL
            type: string
          - name: coverId
            label: Cover Drive file ID
            type: string
          - name: cover
            label: Cover thumbnail URL
            type: string
          - name: imageAlt
            label: Cover description
            type: string
          - name: youtubeUrl
            label: YouTube URL (optional)
            type: string
          - name: youtubeThumbnail
            label: YouTube thumbnail URL (optional)
            type: string
          - name: summary
            label: Short description
            type: text
          - name: outcome
            label: Outcome
            type: text
          - name: article
            label: Full article
            type: text
          - name: tags
            label: Tags
            type: string
            list: true
          - name: media
            label: Drive images, videos and documents
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{title} / {type}"
            fields:
              - name: id
                label: Drive file ID
                type: string
                required: true
              - name: title
                label: File title
                type: string
              - name: type
                label: File type
                type: select
                options:
                  values:
                    - name: image
                      label: Image
                    - name: video
                      label: Video
                    - name: pdf
                      label: PDF
                    - name: document
                      label: Document
                    - name: presentation
                      label: Presentation
                    - name: link
                      label: Drive shortcut or link
                    - name: file
                      label: Other file
              - name: mime
                label: MIME type
                type: string
              - name: sourceUrl
                label: Open in Drive URL
                type: string
              - name: previewUrl
                label: Embedded Drive Preview URL
                type: string
              - name: thumbnail
                label: Drive thumbnail URL
                type: string

      - name: profileDocuments
        label: About me documents
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{label} / {title}"
        fields:
          - name: title
            label: Document title
            type: string
          - name: label
            label: Short label
            type: string
          - name: sourceUrl
            label: Open in Drive URL
            type: string
          - name: previewUrl
            label: Embedded Drive Preview URL
            type: string
          - name: thumbnail
            label: Cover image URL
            type: string

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "Create {path} via portfolio editor"
      update: "Update {path} via portfolio editor"
      delete: "Delete {path} via portfolio editor"
      rename: "Rename {oldPath} to {newPath} via portfolio editor"
